---
# Enhanced Ansible playbook for ECS deployment with SSL and monitoring

- name: Deploy Kerala Tours Application to ECS
  hosts: localhost
  gather_facts: no
  vars:
    aws_region: "ap-south-1"
    app_name: "kerala-toors"
    docker_image: "omwarkri123/react-app:latest"
    domain_name: "kerala-toors.com"
    desired_count: 2

  tasks:
    # Terraform initialization and validation
    - name: Initialize Terraform
      terraform:
        project_path: "{{ playbook_dir }}/../terraform"
        state: present
        variables:
          aws_region: "{{ aws_region }}"
          app_name: "{{ app_name }}"
          docker_image_url: "{{ docker_image }}"
          domain_name: "{{ domain_name }}"
          desired_count: "{{ desired_count }}"
      register: terraform_output

    - name: Display Terraform outputs
      debug:
        msg: |
          Terraform deployment completed successfully!
          ALB DNS: {{ terraform_output.stdout | from_json | jq '.alb_dns_name.value' }}
          Application URL: {{ terraform_output.stdout | from_json | jq '.application_url.value' }}
          CloudWatch Dashboard: {{ terraform_output.stdout | from_json | jq '.cloudwatch_dashboard_url.value' }}

    # Verify ECS Cluster
    - name: Get ECS cluster details
      amazon.aws.ecs_cluster_info:
        region: "{{ aws_region }}"
        clusters:
          - "{{ app_name }}-cluster"
      register: ecs_cluster_info
      retries: 3
      delay: 10

    - name: Display ECS cluster status
      debug:
        msg: "ECS Cluster {{ app_name }}-cluster is active with {{ ecs_cluster_info.clusters[0].statistics[0].value }} tasks"

    # Verify ALB health
    - name: Get ALB target group health
      amazon.aws.elb_target_group_info:
        region: "{{ aws_region }}"
        names:
          - "{{ app_name }}-tg"
      register: target_group_health

    - name: Display target group health status
      debug:
        msg: "Target Group health: {{ target_group_health.target_groups[0]['health_check_enabled'] }}"

    # Check SSL Certificate
    - name: Verify ACM Certificate
      amazon.aws.acm_certificate_info:
        region: "{{ aws_region }}"
        domain_name: "{{ domain_name }}"
      register: certificate_info

    - name: Display SSL Certificate status
      debug:
        msg: "SSL Certificate status: {{ certificate_info.certificates[0]['status'] }}"

    # Create DNS records
    - name: Get Route53 zone
      amazon.aws.route53_info:
        region: "{{ aws_region }}"
        query: hosted_zone
        zone_names:
          - "{{ domain_name }}"
      register: route53_zone
      ignore_errors: yes

    - name: Display Route53 configuration
      debug:
        msg: "DNS Zone configured for {{ domain_name }}"
      when: route53_zone.hosted_zones | length > 0

    # Verify monitoring setup
    - name: Check CloudWatch Alarms
      amazon.aws.cloudwatch_metric_alarm_info:
        region: "{{ aws_region }}"
        alarm_names:
          - "{{ app_name }}-high-cpu"
          - "{{ app_name }}-high-memory"
          - "{{ app_name }}-unhealthy-hosts"
      register: cloudwatch_alarms

    - name: Display monitoring status
      debug:
        msg: "{{ cloudwatch_alarms.metric_alarms | length }} CloudWatch alarms configured"

    # Log deployment summary
    - name: Create deployment summary
      copy:
        content: |
          ================================================================================
          KERALA TOURS - ECS DEPLOYMENT SUMMARY
          ================================================================================
          
          Deployment Date: {{ ansible_date_time.iso8601 }}
          Application: {{ app_name }}
          Region: {{ aws_region }}
          Domain: {{ domain_name }}
          
          INFRASTRUCTURE:
          ================
          - ECS Cluster: {{ app_name }}-cluster
          - ECS Service: {{ app_name }}-service
          - Task Count: {{ desired_count }}
          - Load Balancer: Application Load Balancer (ALB)
          
          NETWORKING:
          ===========
          - VPC CIDR: 10.0.0.0/16
          - Public Subnets: 10.0.1.0/24, 10.0.2.0/24
          - Private Subnets: 10.0.10.0/24, 10.0.11.0/24
          - NAT Gateway: Enabled for outbound traffic
          
          SECURITY:
          =========
          - SSL/TLS: AWS Certificate Manager (Free)
          - Certificate Domain: {{ domain_name }}, *.{{ domain_name }}
          - HTTP to HTTPS: Automatic redirect enabled
          - Security Groups: ALB-SG, ECS-Tasks-SG, Monitoring-SG
          
          MONITORING & ALERTS:
          ====================
          - CloudWatch Container Insights: Enabled
          - Log Group: /ecs/{{ app_name }}
          - CPU Alarm Threshold: 80%
          - Memory Alarm Threshold: 85%
          - Response Time Threshold: 1 second
          - Unhealthy Hosts Alert: Enabled
          - Alert Method: SNS Email Notifications
          
          AUTO-SCALING:
          =============
          - Min Tasks: {{ desired_count }}
          - Max Tasks: 4
          - Scale by CPU: 70% target
          - Scale by Memory: 80% target
          
          ACCESS:
          =======
          - Application URL: https://{{ domain_name }}
          - CloudWatch Logs: /ecs/{{ app_name }}
          - CloudWatch Dashboard: Available in AWS Console
          
          NEXT STEPS:
          ===========
          1. Update SNS subscription email in monitoring.tf (your-email@example.com)
          2. Verify Route53 nameservers with domain registrar
          3. Test HTTPS access to {{ domain_name }}
          4. Monitor CloudWatch dashboard for application health
          5. Configure additional monitoring as needed
          
          ================================================================================
        dest: "{{ playbook_dir }}/DEPLOYMENT_SUMMARY.txt"

    - name: Display deployment summary file path
      debug:
        msg: "Deployment summary saved to {{ playbook_dir }}/DEPLOYMENT_SUMMARY.txt"

    - name: Success message
      debug:
        msg: |
          ✓ ECS Deployment Completed Successfully!
          ✓ SSL Certificate configured (HTTPS enabled)
          ✓ Route53 DNS configured
          ✓ CloudWatch monitoring active
          ✓ Auto-scaling configured
